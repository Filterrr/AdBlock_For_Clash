name: Run_AdBlock_Rule_Generators  # 合并后的工作流名称

on:
  schedule:
    - cron: '*/20 * * * *'  # 每20分钟运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 环境

    steps:
    - name: Checkout repository  # 检出代码仓库
      uses: actions/checkout@v3

    - name: Setup Node.js 24  # 设置 Node.js 环境
      uses: actions/setup-node@v3
      with:
        node-version: '24'

    # 注意：GitHub Actions 的 ubuntu-latest 环境已预装 PowerShell (pwsh)，
    # 因此删除了冗余的安装步骤以提高运行效率 [cite: 2025-11-25]

    - name: Run AdBlock Rule Generators  # 依次运行 YAML 和 TXT 生成脚本
      run: |
        pwsh -File ./adblock_rule_generator_yaml.ps1
        pwsh -File ./adblock_rule_generator_txt.ps1

    - name: Force Add and Commit files  # 同时添加并提交两个文件
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add -f adblock_reject.yaml adblock_reject.txt
        git commit -m 'Update adblock rules (auto)' || git commit --allow-empty -m 'Empty commit to force push'

    - name: Retry Push files  # 推送更改，失败时重试
      env:
        TOKEN: ${{ secrets.TOKEN }}
      run: |
        for i in {1..5}; do
          git push --force origin HEAD && exit 0 || (echo "Push failed, retrying in 10 seconds..." && sleep 10)
        done